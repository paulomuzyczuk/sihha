allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# pnpm no longer reads overrides from package.json's "pnpm" field.
# Scoped so only the vulnerable glob range (GHSA-5j98-mcp5-4vw2) is bumped,
# leaving the unrelated glob@7 (jest toolchain) untouched.
overrides:
  'glob@>=10.2.0 <10.5.0': ^10.5.0
