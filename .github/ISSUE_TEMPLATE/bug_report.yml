name: Bug report
description: The code does not do what the docs say it should
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. **Security issues do not belong here** — use
        private vulnerability reporting instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead?
      placeholder: Steps to reproduce, expected vs. actual behavior.
    validations:
      required: true
  - type: input
    id: deployment
    attributes:
      label: Deployment
      description: How are you running sihha?
      placeholder: e.g. Vercel + Supabase cloud, or pnpm dev + local Supabase
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.1.0, or a commit SHA
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Server logs, browser console, failing test output. Redact anything personal.
      render: shell
